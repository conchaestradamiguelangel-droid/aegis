name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check services
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check aegis-pq.com
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 https://aegis-pq.com)
          echo "AEGIS HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::AEGIS DOWN — HTTP $STATUS"
            echo "AEGIS_DOWN=true" >> $GITHUB_ENV
          fi

      - name: Check enlil-council.com/dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 https://enlil-council.com/dashboard)
          echo "ENLIL HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::ENLIL DOWN — HTTP $STATUS"
            echo "ENLIL_DOWN=true" >> $GITHUB_ENV
          fi

      - name: Open issue if any service is down
        if: env.AEGIS_DOWN == 'true' || env.ENLIL_DOWN == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const down = [];
            if (process.env.AEGIS_DOWN === 'true') down.push('AEGIS (https://aegis-pq.com)');
            if (process.env.ENLIL_DOWN === 'true') down.push('ENLIL (https://enlil-council.com/dashboard)');
            const title = `🚨 Service down: ${down.join(', ')}`;
            const body = `Detected at ${new Date().toISOString()}\n\nServices down:\n${down.map(s => '- ' + s).join('\n')}\n\nThis issue was opened automatically by the uptime monitor.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'uptime'
            });
            const exists = issues.some(i => i.title.includes('Service down'));
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['uptime']
              });
            }
