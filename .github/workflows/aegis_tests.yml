name: AEGIS Security Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHONPATH: .

jobs:
  # ── 1. Sintaxis ──────────────────────────────────────────────────────────────
  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime dependencies
        run: pip install -r requirements.txt
      - name: Syntax check — all modules
        run: |
          FAIL=0
          for f in core/*.py layers/*.py integrations/*.py main.py status_server.py; do
            python3 -m py_compile "$f" && echo "✓ $f" || { echo "✗ SYNTAX ERROR: $f"; FAIL=1; }
          done
          exit $FAIL

  # ── 2. Security Gate — bloquea merge si falla ────────────────────────────────
  security-gate:
    name: Security Gate
    needs: syntax
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      - name: Core unit tests (pytest)
        run: pytest tests/test_suite.py -v -k "not integration"
      - name: Integration tests
        run: pytest tests/test_suite.py -v -m slow
      - name: Red Team A1 — APT lento
        run: python3 tests/redteam_A1.py
      - name: Red Team A2 — Scan distribuido
        run: python3 tests/redteam_A2.py
      - name: Red Team B1 — Evasión mimicry
        run: python3 tests/redteam_B1.py
      - name: Red Team B2 — Replay/timing
        run: python3 tests/redteam_B2.py
      - name: Red Team C1 — Lateral movement
        run: python3 tests/redteam_C1.py
      - name: Red Team C2 — Exfiltración
        run: python3 tests/redteam_C2.py
      - name: Red Team D1 — Cripto-ataque
        run: python3 tests/redteam_D1.py
      - name: Red Team D2 — Ransomware sim
        run: python3 tests/redteam_D2.py
      - name: Red Team E2 — Flood ML/Learning
        run: python3 tests/redteam_E2.py

  # ── 3. Límites conocidos (no bloquea merge) ──────────────────────────────────
  known-limits:
    name: Known Limits (non-blocking)
    needs: syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Red Team E1 — DoS volumétrico (54 fallos E1 documentados >250 RPS)
        run: python3 tests/redteam_E1.py

  # ── 4. Resumen ───────────────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: [ security-gate, known-limits ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Security status
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║        AEGIS — CI/CD Security Report         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║ Gate: crypto + all layers + WAL + red team  ║"
          echo "║ Known limit: E1 latency >250 RPS (docs ok)  ║"
          echo "╚══════════════════════════════════════════════╝"
